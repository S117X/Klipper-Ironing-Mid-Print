# Mid-print per-object ironing — Mainsail macro prompts only.
# Uses the same exclude_object list as Mainsail's exclude dialog.

[gcode_shell_command iron_index]
command: python3 /home/x/printer_data/scripts/iron_scheduler.py index --file
timeout: 300.0

[gcode_shell_command iron_enable]
command: python3 /home/x/printer_data/scripts/iron_scheduler.py enable --file
timeout: 60.0

[gcode_macro IRON_MENU]
description: Open bed-map iron picker (/iron-picker/)
gcode:
  {% set state = printer.print_stats.state %}
  {% if state != "printing" and state != "paused" %}
    {action_raise_error("Start or pause a print before using Iron.")}
  {% endif %}
  {% set objs = printer.exclude_object.objects %}
  {% if objs|length == 0 %}
    {action_raise_error("No objects found. Enable label objects in OrcaSlicer.")}
  {% endif %}
  {action_respond_info("Use the Iron Object button in the Mainsail status panel to open the bed-map picker.")}

[gcode_macro IRON_MODE_MENU]
description: Choose iron mode for selected object
gcode:
  {% set obj = params.OBJECT|default('') %}
  {% if not obj %}
    {action_raise_error("No object selected.")}
  {% endif %}
  {% set label = obj.split('.')[0].replace('_', ' ') %}
  {% set top_cmd = 'IRON_ENABLE OBJECT="' ~ obj ~ '" MODE=topmost' %}
  {% set all_cmd = 'IRON_ENABLE OBJECT="' ~ obj ~ '" MODE=all_top' %}
  {% set top_btn = 'Top Surface Only|' ~ top_cmd ~ '|primary' %}
  {% set all_btn = 'All Top Layers|' ~ all_cmd ~ '|secondary' %}
  RESPOND TYPE=command MSG="action:prompt_begin Iron Mode"
  RESPOND TYPE=command MSG='{"action:prompt_text Object: %s" % label}'
  RESPOND TYPE=command MSG='{"action:prompt_button %s" % top_btn}'
  RESPOND TYPE=command MSG='{"action:prompt_button %s" % all_btn}'
  RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|RESPOND TYPE=command MSG=action:prompt_end|error"
  RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro IRON_ENABLE]
description: Schedule ironing for remaining top layers of one object
gcode:
  {% set state = printer.print_stats.state %}
  {% if state != "printing" and state != "paused" %}
    {action_raise_error("Start or pause a print before using Iron.")}
  {% endif %}
  {% set obj = params.OBJECT|default('') %}
  {% set mode = params.MODE|default('topmost') %}
  {% if not obj %}
    {action_raise_error("OBJECT required.")}
  {% endif %}
  {% set fname = printer.print_stats.filename %}
  {% if not fname %}
    {action_raise_error("No active print file.")}
  {% endif %}
  {% if ' ' in obj %}
    {% set obj_arg = "'" ~ obj ~ "'" %}
  {% else %}
    {% set obj_arg = obj %}
  {% endif %}
  {% set enable_args = fname ~ ' --object ' ~ obj_arg ~ ' --mode ' ~ mode %}
  RUN_SHELL_COMMAND CMD=iron_enable PARAMS="{enable_args}"
  {action_respond_info("Iron request sent for " ~ obj ~ " (" ~ mode ~ ") — check console for ok/error.")}
  RESPOND TYPE=command MSG="action:prompt_end"